<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Audio Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 2rem; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #334155; }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary); letter-spacing: -0.025em; }
        #drop-zone { border: 2px dashed #475569; padding: 2rem; text-align: center; cursor: pointer; border-radius: 0.75rem; background: #0f172a; transition: all 0.2s ease; margin-bottom: 1.5rem; }
        #drop-zone:hover { border-color: var(--primary); background: #1e293b; }
        .controls { display: none; }
        .timer-display { font-size: 3.5rem; text-align: center; font-family: 'JetBrains Mono', monospace; color: var(--accent); margin: 1rem 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
        input[type="number"] { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-size: 1rem; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }
        audio { width: 100%; margin-bottom: 1rem; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        #status { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--accent); min-height: 1.25rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Audio Editor</h1>
    
    <div id="drop-zone">Vyberte nebo přetáhněte zvukový soubor</div>
    <input type="file" id="file-input" accept="audio/mp3, audio/wav" style="display: none;">

    <div id="controls" class="controls">
        <div class="timer-display" id="time-display">0.00</div>
        <audio id="player" controls></audio>
        
        <div class="input-grid">
            <div>
                <label>Začátek (s)</label>
                <input type="number" id="start-time" value="0" step="0.01">
            </div>
            <div>
                <label>Konec (s)</label>
                <input type="number" id="end-time" value="0" step="0.01">
            </div>
        </div>
        
        <button id="export-btn">Oříznout a stáhnout MP3</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const controls = document.getElementById('controls');
    const player = document.getElementById('player');
    const timeDisplay = document.getElementById('time-display');
    const startInput = document.getElementById('start-time');
    const endInput = document.getElementById('end-time');
    const exportBtn = document.getElementById('export-btn');
    const status = document.getElementById('status');

    let audioBuffer;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Plynulá aktualizace času
    function updateTimer() {
        timeDisplay.innerText = player.currentTime.toFixed(2);
        requestAnimationFrame(updateTimer);
    }
    requestAnimationFrame(updateTimer);

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#007bff"; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = "#475569"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        status.innerText = "Načítání...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = e.target.result;
            player.src = URL.createObjectURL(file);
            audioBuffer = await audioCtx.decodeAudioData(data);
            endInput.value = audioBuffer.duration.toFixed(2);
            controls.style.display = 'block';
            dropZone.innerText = "Soubor připraven";
            status.innerText = "";
        };
        reader.readAsArrayBuffer(file);
    }

    exportBtn.onclick = async () => {
        const start = parseFloat(startInput.value);
        const end = parseFloat(endInput.value);
        if (start >= end) return alert("Neplatný rozsah");

        exportBtn.disabled = true;
        status.innerText = "Probíhá export do MP3...";

        const sampleRate = audioBuffer.sampleRate;
        const frameCount = Math.floor((end - start) * sampleRate);
        const startOffset = Math.floor(start * sampleRate);

        const left = audioBuffer.getChannelData(0).slice(startOffset, startOffset + frameCount);
        const right = audioBuffer.numberOfChannels > 1 
            ? audioBuffer.getChannelData(1).slice(startOffset, startOffset + frameCount) 
            : left;

        const mp3Blob = await encodeMp3(left, right, sampleRate);
        const url = URL.createObjectURL(mp3Blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "upraveny_zvuk.mp3";
        a.click();

        exportBtn.disabled = false;
        status.innerText = "Staženo";
    };

    function encodeMp3(left, right, sampleRate) {
        return new Promise((resolve) => {
            const encoder = new lamejs.Mp3Encoder(2, sampleRate, 128);
            const mp3Data = [];
            const toInt16 = (f) => f < 0 ? f * 0x8000 : f * 0x7FFF;
            
            const lp = new Int16Array(left.length);
            const rp = new Int16Array(right.length);
            for (let i = 0; i < left.length; i++) {
                lp[i] = toInt16(left[i]);
                rp[i] = toInt16(right[i]);
            }

            const blockSize = 1152;
            for (let i = 0; i < lp.length; i += blockSize) {
                const lChunk = lp.subarray(i, i + blockSize);
                const rChunk = rp.subarray(i, i + blockSize);
                const buf = encoder.encodeBuffer(lChunk, rChunk);
                if (buf.length > 0) mp3Data.push(buf);
            }
            const final = encoder.flush();
            if (final.length > 0) mp3Data.push(final);
            resolve(new Blob(mp3Data, { type: 'audio/mp3' }));
        });
    }
</script>

</body>
</html>
