<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Audio Editor Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
            --accent: #10b981;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 100%; max-width: 480px; border: 1px solid #2d2d35; }
        h1 { text-align: center; font-size: 1.25rem; margin-bottom: 2rem; color: var(--text); opacity: 0.9; text-transform: uppercase; letter-spacing: 2px; }
        #drop-zone { border: 2px dashed #3f3f46; padding: 3rem 1rem; text-align: center; cursor: pointer; border-radius: 1rem; background: #0f0f12; transition: 0.2s; margin-bottom: 1.5rem; }
        #drop-zone:hover { border-color: var(--primary); background: #1a1a20; }
        .controls { display: none; }
        .timer-display { font-size: 4rem; text-align: center; font-family: 'Courier New', monospace; color: var(--accent); margin-bottom: 1.5rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.75rem; color: #a1a1aa; margin-bottom: 0.5rem; text-transform: uppercase; }
        input[type="number"] { width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid #3f3f46; background: #0a0a0c; color: white; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 1.2rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        button:disabled { background: #27272a; cursor: not-allowed; transform: none; }
        audio { width: 100%; margin-bottom: 1.5rem; height: 40px; }
        #status { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #a1a1aa; height: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Audio Editor</h1>
    
    <div id="drop-zone">Vložte MP3 nebo WAV soubor</div>
    <input type="file" id="file-input" accept="audio/*" style="display: none;">

    <div id="controls" class="controls">
        <div class="timer-display" id="time-display">0.00</div>
        <audio id="player" controls></audio>
        
        <div class="input-grid">
            <div>
                <label>Začátek (sekundy)</label>
                <input type="number" id="start-time" value="0" step="0.01">
            </div>
            <div>
                <label>Konec (sekundy)</label>
                <input type="number" id="end-time" value="0" step="0.01">
            </div>
        </div>
        
        <button id="export-btn">Stáhnout čisté MP3</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const controls = document.getElementById('controls');
    const player = document.getElementById('player');
    const timeDisplay = document.getElementById('time-display');
    const startInput = document.getElementById('start-time');
    const endInput = document.getElementById('end-time');
    const exportBtn = document.getElementById('export-btn');
    const status = document.getElementById('status');

    let audioBuffer;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function updateTimer() {
        timeDisplay.innerText = player.currentTime.toFixed(2);
        requestAnimationFrame(updateTimer);
    }
    requestAnimationFrame(updateTimer);

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#3b82f6"; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = "#3f3f46"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        status.innerText = "Dekódování...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = e.target.result;
                player.src = URL.createObjectURL(file);
                audioBuffer = await audioCtx.decodeAudioData(data);
                endInput.value = audioBuffer.duration.toFixed(2);
                controls.style.display = 'block';
                dropZone.innerText = "Soubor načten";
                status.innerText = "";
            } catch (err) {
                alert("Nepodporovaný formát.");
                status.innerText = "";
            }
        };
        reader.readAsArrayBuffer(file);
    }

    exportBtn.onclick = async () => {
        const start = parseFloat(startInput.value);
        const end = parseFloat(endInput.value);
        if (start >= end || start < 0) return alert("Zkontrolujte časy");

        exportBtn.disabled = true;
        status.innerText = "Exportuji čistý zvuk...";

        const sampleRate = audioBuffer.sampleRate;
        const frameCount = Math.floor((end - start) * sampleRate);
        const startOffset = Math.floor(start * sampleRate);

        // Získání kanálů
        const left = audioBuffer.getChannelData(0).slice(startOffset, startOffset + frameCount);
        const right = audioBuffer.numberOfChannels > 1 
            ? audioBuffer.getChannelData(1).slice(startOffset, startOffset + frameCount) 
            : new Float32Array(left);

        // Kódování s ochranou proti šumu (limiter/gain reduction)
        const mp3Blob = await encodeMp3(left, right, sampleRate);
        const url = URL.createObjectURL(mp3Blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "export.mp3";
        a.click();

        exportBtn.disabled = false;
        status.innerText = "Dokončeno";
    };

    function encodeMp3(left, right, sampleRate) {
        return new Promise((resolve) => {
            const encoder = new lamejs.Mp3Encoder(2, sampleRate, 192); // Vyšší bitrate pro čistotu
            const mp3Data = [];
            
            // Ochrana proti clippingu (ztišení o cca 10% pro eliminaci šumu)
            const volumeReduction = 0.9; 

            const lp = new Int16Array(left.length);
            const rp = new Int16Array(right.length);
            
            for (let i = 0; i < left.length; i++) {
                // Převod na Int16 s mírným ztišením
                let sL = left[i] * volumeReduction;
                let sR = right[i] * volumeReduction;
                
                lp[i] = sL < 0 ? sL * 0x8000 : sL * 0x7FFF;
                rp[i] = sR < 0 ? sR * 0x8000 : sR * 0x7FFF;
            }

            const blockSize = 1152;
            for (let i = 0; i < lp.length; i += blockSize) {
                const lChunk = lp.subarray(i, i + blockSize);
                const rChunk = rp.subarray(i, i + blockSize);
                const buf = encoder.encodeBuffer(lChunk, rChunk);
                if (buf.length > 0) mp3Data.push(buf);
            }
            const final = encoder.flush();
            if (final.length > 0) mp3Data.push(final);
            
            resolve(new Blob(mp3Data, { type: 'audio/mp3' }));
        });
    }
</script>

</body>
</html>
